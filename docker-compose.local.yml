volumes:
  lukasz_pudlo_local_postgres_data: {}
  lukasz_pudlo_local_postgres_data_backups: {}
  lukasz_pudlo_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: lukasz_pudlo_local_django
    container_name: lukasz_pudlo_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - "8000:8000"
    command: /start

  postgres:
    image: postgres:18
    container_name: lukasz_pudlo_local_postgres
    volumes:
      - lukasz_pudlo_local_postgres_data:/var/lib/postgresql
      - lukasz_pudlo_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  mailpit:
    image: axllent/mailpit:latest
    container_name: lukasz_pudlo_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: redis:7.2
    container_name: lukasz_pudlo_local_redis
    volumes:
      - lukasz_pudlo_local_redis_data:/data

  celeryworker:
    <<: *django
    image: lukasz_pudlo_local_celeryworker
    container_name: lukasz_pudlo_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: lukasz_pudlo_local_celerybeat
    container_name: lukasz_pudlo_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: lukasz_pudlo_local_flower
    container_name: lukasz_pudlo_local_flower
    ports:
      - "5555:5555"
    command: /start-flower
