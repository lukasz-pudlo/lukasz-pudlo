{% spaceless %}
<nav aria-label="Portfolio cases">
  <ul class="case-tabs">
    {% for item in projects %}
      <li class="case-tabs__item">
        <a href="{% url 'pages:project_detail' item.slug %}"{% if project.slug == item.slug %} aria-current="page"{% endif %}>
          <span class="case-tabs__num">Case {{ forloop.counter|stringformat:"02d" }}</span>
          <span class="case-tabs__title">{{ item.title }}</span>
        </a>
      </li>
    {% endfor %}
    <li class="case-tabs__item case-tabs__item--index">
      <a href="{% url 'pages:portfolio' %}"{% if not project %} aria-current="page"{% endif %}>
        <span class="case-tabs__num">Index</span>
        <span class="case-tabs__title">All cases &nbsp;▸</span>
      </a>
    </li>
  </ul>
</nav>
{% endspaceless %}
